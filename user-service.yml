server:
  port: 9001

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cricuitdb
    username: root
    password: Thiru@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Options for ddl-auto: none, update, create, create-drop, validate
      ddl-auto: update 
    show-sql: true
  application:
    name: user-service
resilience4j:
  circuitbreaker:
    instances:
      product-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 3s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10
      order-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 3s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
