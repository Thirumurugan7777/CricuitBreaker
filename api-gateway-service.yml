server:
  port: 8000

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
          - name: CircuitBreaker
            args:
              name: user-service
              fallbackUri: forward:/userFallback
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/product/**
          filters:
          - name: CircuitBreaker
            args:
              name: product-service
              fallbackUri: forward:/productFallback

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**
          filters:
          - name: CircuitBreaker
            args:
              name: order-service
              fallbackUri: forward:/orderFallback
          

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/  

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 3s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10
      product-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 3s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10
      order-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 3s
        permittedNumberOfCallsInHalfOpenState: 3
        eventConsumerBufferSize: 10
